<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Chat bubbles -->
  <rect x="100" y="20" width="60" height="35" rx="8" fill="#F5F0EB" stroke="#E0D6CC" stroke-width="1.5"/>
  <rect x="105" y="30" width="30" height="3" rx="1.5" fill="#CCC"/>
  <rect x="105" y="37" width="45" height="3" rx="1.5" fill="#CCC"/>
  <rect x="105" y="44" width="20" height="3" rx="1.5" fill="#CCC"/>

  <rect x="240" y="10" width="60" height="35" rx="8" fill="#F5F0EB" stroke="#E0D6CC" stroke-width="1.5"/>
  <rect x="245" y="20" width="35" height="3" rx="1.5" fill="#CCC"/>
  <rect x="245" y="27" width="50" height="3" rx="1.5" fill="#CCC"/>
  <rect x="245" y="34" width="25" height="3" rx="1.5" fill="#CCC"/>

  <!-- Left monitor -->
  <rect x="60" y="80" width="130" height="100" rx="8" fill="white" stroke="#E0D6CC" stroke-width="2"/>
  <rect x="110" y="180" width="30" height="15" fill="#E0D6CC"/>
  <rect x="95" y="195" width="60" height="5" rx="2.5" fill="#E0D6CC"/>

  <!-- Right monitor -->
  <rect x="210" y="80" width="130" height="100" rx="8" fill="white" stroke="#E0D6CC" stroke-width="2"/>
  <rect x="260" y="180" width="30" height="15" fill="#E0D6CC"/>
  <rect x="245" y="195" width="60" height="5" rx="2.5" fill="#E0D6CC"/>

  <!-- Person 1 (left) - man with tie -->
  <circle cx="125" cy="115" r="18" fill="#FDDCB5"/>
  <path d="M107 108 C107 95 143 95 143 108" fill="#2C2C2C"/>
  <circle cx="119" cy="117" r="2" fill="#2C2C2C"/>
  <circle cx="131" cy="117" r="2" fill="#2C2C2C"/>
  <path d="M120 125 Q125 129 130 125" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <!-- Tie -->
  <path d="M125 133 L125 155" stroke="#3B82F6" stroke-width="4"/>
  <path d="M121 133 L129 133 L127 138 L125 155 L123 138 Z" fill="#3B82F6"/>
  <!-- Shirt collar -->
  <path d="M113 133 L125 140 L137 133" stroke="#FFF" stroke-width="2" fill="none"/>
  <!-- Body -->
  <path d="M108 160 Q108 135 125 135 Q142 135 142 160" fill="white"/>
  <!-- Waving hand -->
  <circle cx="148" cy="140" r="6" fill="#FDDCB5"/>
  <path d="M142 135 L148 128" stroke="#FDDCB5" stroke-width="5" stroke-linecap="round"/>

  <!-- Person 2 (right) - woman with headset -->
  <circle cx="275" cy="115" r="18" fill="#FDDCB5"/>
  <path d="M257 105 C257 88 293 88 293 105 L293 110 C290 108 260 108 257 110 Z" fill="#2C2C2C"/>
  <circle cx="269" cy="117" r="2" fill="#2C2C2C"/>
  <circle cx="281" cy="117" r="2" fill="#2C2C2C"/>
  <path d="M270 125 Q275 128 280 125" stroke="#2C2C2C" stroke-width="1.5" fill="none"/>
  <!-- Headset -->
  <path d="M256 112 C256 100 294 100 294 112" stroke="#555" stroke-width="2.5" fill="none"/>
  <rect x="253" y="110" width="6" height="12" rx="3" fill="#555"/>
  <rect x="291" y="110" width="6" height="12" rx="3" fill="#555"/>
  <circle cx="256" cy="128" r="4" fill="#555"/>
  <path d="M256 124 L256 132" stroke="#555" stroke-width="2"/>
  <!-- Body -->
  <path d="M258 160 Q258 135 275 135 Q292 135 292 160" fill="#F97316"/>

  <!-- Connection lines between monitors -->
  <path d="M190 130 Q200 130 210 130" stroke="#E0D6CC" stroke-width="1" stroke-dasharray="4 3"/>
</svg>
